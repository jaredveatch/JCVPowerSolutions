<!DOCTYPE html>
<html lang="en">
<head>
    <title>Create Job | JCV</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin: 0;
            background: #f4f5f7;
            font-family: Inter, -apple-system, BlinkMacSystemFont, sans-serif;
            color: #111827;
        }

        .topbar {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 18px;
        }

        .topbar a {
            color: #0b0b0c;
            font-weight: 900;
            text-decoration: none;
        }

        .container {
            max-width: 900px;
            margin: auto;
            padding: 18px;
        }

        .hero {
            background: #0b0b0c;
            color: white;
            border-radius: 28px;
            padding: 24px;
            margin-bottom: 18px;
        }

        .hero h1 {
            margin: 0;
            font-size: 34px;
            letter-spacing: -.05em;
        }

        .hero p {
            color: #d1d5db;
        }

        form {
            background: white;
            border-radius: 28px;
            padding: 22px;
            border: 1px solid #e5e7eb;
            box-shadow: 0 8px 24px rgba(0,0,0,.05);
        }

        label {
            display: block;
            font-weight: 900;
            margin: 16px 0 8px;
        }

        input,
        select,
        textarea {
            width: 100%;
            padding: 14px;
            border-radius: 16px;
            border: 1px solid #d1d5db;
            font-size: 15px;
        }

        textarea {
            min-height: 110px;
        }

        button {
            margin-top: 20px;
            width: 100%;
            background: #ffc400;
            color: black;
            border: none;
            padding: 16px;
            border-radius: 18px;
            font-weight: 950;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="topbar">
    <a href="/customers/{{ customer.id }}/">← Back to {{ customer.name }}</a>
</div>

<div class="container">

    <section class="hero">
        <h1>Create Job</h1>
        <p>Start a site visit, walkthrough, or job for {{ customer.name }}.</p>
    </section>

    <form method="POST">
        {% csrf_token %}

        <label>Service Template</label>
        <select name="template">
            <option value="">No template / custom job</option>

            {% for template in templates %}
                <option value="{{ template.id }}">
                    {{ template.icon }} {{ template.name }} - ${{ template.default_price }}
                </option>
            {% endfor %}
        </select>

        <label>Job Title</label>
        <input type="text" name="title" placeholder="Example: 200A Panel Upgrade">

        <label>Status</label>
        <select name="status">
            <option value="site_visit">Site Visit</option>
            <option value="estimate_needed">Estimate Needed</option>
            <option value="scheduled">Scheduled</option>
            <option value="in_progress">In Progress</option>
        </select>

        <label>Job Address</label>
        <input type="text" name="job_address" value="{{ customer.address }}">

        <label>Scheduled Date</label>
        <input type="datetime-local" name="scheduled_date">

        <label>Customer-Facing Description</label>
        <textarea name="description" placeholder="Describe the work for the customer..."></textarea>

        <label>Site Visit Notes</label>
        <textarea name="site_notes" placeholder="Panel location, attic access, grounding, utility notes, measurements..."></textarea>

        <label>Material Notes</label>
        <textarea name="material_notes" placeholder="Wire, conduit, breakers, fittings, box count, permit notes..."></textarea>

        <label>Estimated Total Price</label>
        <input type="number" step="0.01" name="estimated_total_price" placeholder="Example: 4850.00">

        <button type="submit">
            Create Job →
        </button>
    </form>

</div>

</body>
</html>
