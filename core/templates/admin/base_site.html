{% extends "admin/base_site.html" %}
{% load static %}

{% block title %}JCV Admin{% endblock %}

{% block branding %}
<div class="jcv-brand">
    <div class="jcv-logo">JCV</div>
    <div>
        <h1>JCV Admin</h1>
        <p>Business Dashboard</p>
    </div>
</div>
{% endblock %}

{% block extrastyle %}
{{ block.super }}

<style>
    :root {
        --primary: #f5c542;
        --accent: #f5c542;
        --primary-fg: #111;
        --body-bg: #f6f7f9;
        --body-fg: #111827;
        --header-bg: #ffffff;
        --header-color: #111827;
        --breadcrumbs-bg: #f6f7f9;
        --breadcrumbs-fg: #6b7280;
        --link-fg: #111827;
        --link-hover-color: #000;
    }

    body {
        background: #f6f7f9 !important;
        color: #111827 !important;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #header {
        background: #ffffff !important;
        color: #111827 !important;
        border-bottom: 1px solid #e5e7eb;
        padding: 14px 18px;
        height: auto;
        box-shadow: 0 2px 10px rgba(0,0,0,.04);
    }

    .jcv-brand {
        display: flex;
        align-items: center;
        gap: 12px;
    }

    .jcv-logo {
        width: 42px;
        height: 42px;
        border-radius: 12px;
        background: #111827;
        color: #f5c542;
        display: flex;
        align-items: center;
        justify-content: center;
        font-weight: 900;
        letter-spacing: .5px;
    }

    .jcv-brand h1 {
        margin: 0;
        font-size: 18px;
        font-weight: 800;
        color: #111827;
    }

    .jcv-brand p {
        margin: 2px 0 0;
        font-size: 12px;
        color: #6b7280;
    }

    #user-tools {
        font-size: 12px;
        color: #6b7280 !important;
    }

    #user-tools a {
        color: #111827 !important;
        font-weight: 600;
    }

    div.breadcrumbs {
        background: transparent !important;
        color: #6b7280 !important;
        padding: 12px 20px;
        border: none;
        font-size: 13px;
    }

    #content {
        padding: 18px;
    }

    #content h1 {
        font-size: 22px;
        font-weight: 850;
        color: #111827 !important;
        margin-bottom: 18px;
    }

    .module {
        background: #ffffff !important;
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        overflow: hidden;
        box-shadow: 0 8px 24px rgba(0,0,0,.05);
        margin-bottom: 18px;
    }

    .module h2,
    .module caption,
    .inline-group h2 {
        background: #ffffff !important;
        color: #111827 !important;
        font-size: 14px;
        font-weight: 800;
        padding: 14px 16px;
        border-bottom: 1px solid #e5e7eb;
    }

    table {
        background: #ffffff !important;
    }

    th {
        background: #ffffff !important;
        color: #6b7280 !important;
        font-size: 12px;
        text-transform: uppercase;
    }

    td {
        background: #ffffff !important;
        color: #111827 !important;
        border-bottom: 1px solid #f1f1f1;
        padding: 12px;
    }

    a:link,
    a:visited {
        color: #111827;
        font-weight: 600;
    }

    input,
    textarea,
    select {
        background: #ffffff !important;
        color: #111827 !important;
        border: 1px solid #d1d5db !important;
        border-radius: 12px;
        padding: 10px;
        font-size: 16px;
    }

    input:focus,
    textarea:focus,
    select:focus {
        border-color: #f5c542 !important;
        outline: none;
        box-shadow: 0 0 0 4px rgba(245,197,66,.25);
    }

    .button,
    input[type=submit],
    input[type=button],
    .submit-row input,
    a.button,
    .object-tools a {
        background: #111827 !important;
        color: #ffffff !important;
        border-radius: 12px !important;
        border: none !important;
        font-weight: 800 !important;
        padding: 10px 14px !important;
        text-transform: none !important;
    }

    .button.default,
    input[type=submit].default,
    .submit-row input.default {
        background: #f5c542 !important;
        color: #111827 !important;
    }

    .delete-link {
        background: #ef4444 !important;
        color: white !important;
        border-radius: 12px;
    }

    .help,
    p.help {
        color: #6b7280 !important;
    }

    @media (max-width: 700px) {
        #header {
            display: block;
            padding: 14px;
        }

        .jcv-brand {
            margin-bottom: 10px;
        }

        #user-tools {
            margin-top: 8px;
            line-height: 1.8;
        }

        #content {
            padding: 14px;
        }

        #content h1 {
            font-size: 20px;
        }

        .module {
            border-radius: 16px;
            margin-bottom: 14px;
        }

        table,
        tbody,
        tr,
        td,
        th {
            font-size: 14px;
        }

        .object-tools {
            float: none;
            margin-bottom: 12px;
        }

        .object-tools li {
            display: block;
            margin-bottom: 8px;
        }

        .object-tools a {
            display: block;
            text-align: center;
        }
    }
</style>
{% endblock %}
