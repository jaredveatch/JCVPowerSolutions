{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow-sm border-0">

        <div class="card-header bg-dark text-white">
            <h4 class="mb-0">Add Material from Catalog</h4>
        </div>

        <div class="card-body">

            <h5 class="mb-3">{{ job.title }}</h5>

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">
                    <label class="form-label">Material</label>

                    <select name="material" class="form-select" required>
                        <option value="">Select material...</option>

                        {% for material in catalog_materials %}
                            <option value="{{ material.id }}">
                                {{ material.name }} - ${{ material.unit_cost }}
                            </option>
                        {% endfor %}
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Quantity</label>

                    <input type="number"
                           name="quantity"
                           class="form-control"
                           value="1"
                           min="0.01"
                           step="0.01"
                           required>
                </div>

                <div class="d-flex gap-2">

                    <button type="submit" class="btn btn-success">
                        Add Material
                    </button>

                    <a href="/jobs/{{ job.id }}/" class="btn btn-danger">
                        Cancel
                    </a>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
