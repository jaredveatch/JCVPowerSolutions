{% extends "base.html" %}

{% block content %}

<div class="card">

    <h1 class="section-title">
        Estimates
    </h1>

    <table>

        <thead>

            <tr>
                <th>Estimate</th>
                <th>Customer</th>
                <th>Status</th>
                <th>Total</th>
                <th></th>
            </tr>

        </thead>

        <tbody>

        {% for estimate in estimates %}

            <tr>

                <td>
                    {{ estimate.title }}
                </td>

                <td>
                    {{ estimate.job.customer.name }}
                </td>

                <td>

                    <span class="badge">
                        {{ estimate.status }}
                    </span>

                </td>

                <td>
                    ${{ estimate.total }}
                </td>

                <td>

                    <a class="btn btn-gold"
                       href="/estimates/{{ estimate.id }}/">

                        Open

                    </a>

                </td>

            </tr>

        {% empty %}

            <tr>

                <td colspan="5">

                    No estimates found.

                </td>

            </tr>

        {% endfor %}

        </tbody>

    </table>

</div>

{% endblock %}
