{% extends "base.html" %}

{% block content %}

<div class="card"
     style="
        background:linear-gradient(
            135deg,
            #0b0b0c 0%,
            #1c1c1c 100%
        );
        color:white;
     ">

    <div style="
        display:flex;
        justify-content:space-between;
        align-items:flex-start;
        gap:20px;
        flex-wrap:wrap;
    ">

        <div>

            <div class="badge"
                 style="
                    background:rgba(255,196,0,.14);
                    color:var(--gold);
                    margin-bottom:18px;
                 ">

                EDIT WORK ORDER

            </div>

            <h1 class="section-title"
                style="
                    color:white;
                    margin-bottom:12px;
                ">

                Edit Job

            </h1>

            <p style="
                color:#d1d5db;
                margin:0;
                line-height:1.7;
                max-width:700px;
            ">

                Update job status, assigned technician,
                field notes, customer-facing scope,
                material checklist, schedule, and pricing.

            </p>

        </div>

        <div>

            <a class="btn"
               href="/jobs/{{ job.id }}/">

                ← Back to Job

            </a>

        </div>

    </div>

</div>


<form method="POST">

    {% csrf_token %}

    <div class="grid grid-2">

        <div class="card">

            <h2 style="margin-top:0;">
                Job Information
            </h2>

            <label>
                Job Title
            </label>

            <input type="text"
                   name="title"
                   value="{{ job.title }}"
                   placeholder="Example: 200A Panel Upgrade"
                   required>

            <label>
                Status
            </label>

            <select name="status">

                <option value="new"
                        {% if job.status == "new" %}selected{% endif %}>
                    New
                </option>

                <option value="site_visit"
                        {% if job.status == "site_visit" %}selected{% endif %}>
                    Site Visit
                </option>

                <option value="estimate_needed"
                        {% if job.status == "estimate_needed" %}selected{% endif %}>
                    Estimate Needed
                </option>

                <option value="estimate_sent"
                        {% if job.status == "estimate_sent" %}selected{% endif %}>
                    Estimate Sent
                </option>

                <option value="approved"
                        {% if job.status == "approved" %}selected{% endif %}>
                    Approved
                </option>

                <option value="scheduled"
                        {% if job.status == "scheduled" %}selected{% endif %}>
                    Scheduled
                </option>

                <option value="in_progress"
                        {% if job.status == "in_progress" %}selected{% endif %}>
                    In Progress
                </option>

                <option value="completed"
                        {% if job.status == "completed" %}selected{% endif %}>
                    Completed
                </option>

                <option value="invoiced"
                        {% if job.status == "invoiced" %}selected{% endif %}>
                    Invoiced
                </option>

                <option value="paid"
                        {% if job.status == "paid" %}selected{% endif %}>
                    Paid
                </option>

                <option value="cancelled"
                        {% if job.status == "cancelled" %}selected{% endif %}>
                    Cancelled
                </option>

            </select>

            <label>
                Priority
            </label>

            <select name="priority">

                <option value="low"
                        {% if job.priority == "low" %}selected{% endif %}>
                    Low
                </option>

                <option value="normal"
                        {% if job.priority == "normal" %}selected{% endif %}>
                    Normal
                </option>

                <option value="high"
                        {% if job.priority == "high" %}selected{% endif %}>
                    High
                </option>

                <option value="urgent"
                        {% if job.priority == "urgent" %}selected{% endif %}>
                    Urgent
                </option>

            </select>

            <label>
                Assigned Technician / Crew
            </label>

            <input type="text"
                   name="assigned_to"
                   value="{{ job.assigned_to }}"
                   placeholder="Technician or crew name">

            <label>
                Job Address
            </label>

            <input type="text"
                   name="job_address"
                   value="{{ job.job_address }}"
                   placeholder="Job address">

            <label>
                Estimated Total Price
            </label>

            <input type="number"
                   step="0.01"
                   name="estimated_total_price"
                   value="{{ job.estimated_total_price }}"
                   placeholder="Example: 4850.00">

        </div>


        <div class="card">

            <h2 style="margin-top:0;">
                Scope & Notes
            </h2>

            <label>
                Customer-Facing Description
            </label>

            <textarea name="description"
                      rows="6"
                      placeholder="Describe the work for the customer...">{{ job.description }}</textarea>

            <label>
                Site Notes
            </label>

            <textarea name="site_notes"
                      rows="6"
                      placeholder="Access notes, panel location, measurements, troubleshooting notes...">{{ job.site_notes }}</textarea>

            <label>
                Material Notes
            </label>

            <textarea name="material_notes"
                      rows="6"
                      placeholder="Wire, conduit, breakers, fittings, permits, tools, equipment...">{{ job.material_notes }}</textarea>

        </div>

    </div>


    <div class="card">

        <div style="
            display:flex;
            justify-content:space-between;
            gap:12px;
            flex-wrap:wrap;
        ">

            <a class="btn"
               href="/jobs/{{ job.id }}/">

                Cancel

            </a>

            <button class="btn btn-gold"
                    type="submit">

                Save Job Changes

            </button>

        </div>

    </div>

</form>

{% endblock %}
