{% extends "base.html" %}

{% block content %}

<div class="card"
     style="
        background:linear-gradient(
            135deg,
            #0b0b0c 0%,
            #1c1c1c 100%
        );
        color:white;
     ">

    <div style="
        display:flex;
        justify-content:space-between;
        align-items:flex-start;
        gap:20px;
        flex-wrap:wrap;
    ">

        <div>

            <div class="badge"
                 style="
                    background:rgba(255,196,0,.14);
                    color:var(--gold);
                    margin-bottom:18px;
                 ">

                CREATE TASK

            </div>

            <h1 class="section-title"
                style="
                    color:white;
                    margin-bottom:12px;
                ">

                New Operations Task

            </h1>

            <p style="
                color:#d1d5db;
                margin:0;
                line-height:1.7;
                max-width:700px;
            ">

                Create technician tasks,
                follow-ups, inspections,
                material runs, callbacks,
                walkthroughs, or scheduling reminders.

            </p>

        </div>

        <div>

            <a class="btn"
               href="/tasks/">

                ← Back to Tasks

            </a>

        </div>

    </div>

</div>


<form method="POST">

    {% csrf_token %}

    <div class="grid grid-2">

        <div class="card">

            <h2 style="margin-top:0;">
                Task Information
            </h2>

            <label>
                Task Title
            </label>

            <input type="text"
                   name="title"
                   placeholder="Example: Verify panel measurements"
                   required>

            <label>
                Assign To
            </label>

            <input type="text"
                   name="assigned_to"
                   placeholder="Technician / crew name">

            <label>
                Priority
            </label>

            <select name="priority">

                <option value="low">
                    Low
                </option>

                <option value="normal"
                        selected>
                    Normal
                </option>

                <option value="high">
                    High
                </option>

                <option value="urgent">
                    Urgent
                </option>

            </select>

            <label>
                Customer
            </label>

            <select name="customer">

                <option value="">
                    No customer selected
                </option>

                {% for customer in customers %}

                    <option value="{{ customer.id }}">

                        {{ customer.name }}

                    </option>

                {% endfor %}

            </select>

            <label>
                Related Job
            </label>

            <select name="job">

                <option value="">
                    No job selected
                </option>

                {% for job in jobs %}

                    <option value="{{ job.id }}">

                        {{ job.title }}

                    </option>

                {% endfor %}

            </select>

        </div>


        <div class="card">

            <h2 style="margin-top:0;">
                Task Notes
            </h2>

            <label>
                Notes / Instructions
            </label>

            <textarea name="notes"
                      rows="16"
                      placeholder="Describe the task, next steps, customer concerns, materials needed, scheduling notes, or field instructions..."></textarea>

        </div>

    </div>


    <div class="card">

        <div style="
            display:flex;
            justify-content:space-between;
            gap:12px;
            flex-wrap:wrap;
        ">

            <a class="btn"
               href="/tasks/">

                Cancel

            </a>

            <button class="btn btn-gold"
                    type="submit">

                Create Task

            </button>

        </div>

    </div>

</form>

{% endblock %}
