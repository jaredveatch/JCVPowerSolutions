<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JCV Command Center Dashboard</title>
    <link rel="stylesheet" href="{% static 'css/dashboard.css' %}">
</head>
<body>
    <header>
        <h1>Welcome to JCV Command Center</h1>
    </header>
    <nav>
        <ul>
            <li><a href="{% url 'core:customer_list' %}">Customers</a></li>
            <li><a href="{% url 'core:job_list' %}">Jobs</a></li>
            <li><a href="{% url 'core:estimate_list' %}">Estimates</a></li>
            <li><a href="{% url 'core:invoice_list' %}">Invoices</a></li>
            <li><a href="{% url 'core:task_list' %}">Tasks</a></li>
        </ul>
    </nav>
    <main>
        <section id="dashboard-overview">
            <h2>Dashboard Overview</h2>
            <div id="stats">
                <div class="stat">
                    <h3>Total Customers</h3>
                    <p id="total-customers">0</p>
                </div>
                <div class="stat">
                    <h3>Total Jobs</h3>
                    <p id="total-jobs">0</p>
                </div>
                <div class="stat">
                    <h3>Total Estimates</h3>
                    <p id="total-estimates">0</p>
                </div>
                <div class="stat">
                    <h3>Total Invoices</h3>
                    <p id="total-invoices">0</p>
                </div>
            </div>
        </section>
        <section id="recent-activity">
            <h2>Recent Activity</h2>
            <ul id="activity-list">
                <!-- Activity items will be dynamically inserted here -->
            </ul>
        </section>
    </main>
    <script src="{% static 'js/dashboard.js' %}"></script>
</body>
</html>
